<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon | Heart & Wine</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/coming-soon.css">
<link rel="stylesheet" href="../global-css/global.css">
<link rel="stylesheet" href="../components/navbar.css">
<link rel="stylesheet" href="../components/footer.css">

<script>
tailwind.config = {
theme:{
extend:{
colors:{
brand:"#8A5A1F",
accent:"#D4A373",
background:"#1c1917",
secondary:"#44403C",
text:"#F5F5F4"
}
}
}
}
</script>

</head>

<body class="bg-background text-text font-[Inter] flex items-center justify-center min-h-screen px-6">

<div class="max-w-xl w-full text-center space-y-8">

<!-- LOGO -->

<a href="#" class="nav-logo" aria-label="Mash & Ale Home" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  
  <img src="../images/keg-2.png" alt="Heart & Wine Logo" style="height:40px;width:auto;object-fit:contain;">
  
  <span class="logo-text" style="font-family:var(--font-d);font-size:1.5rem;letter-spacing:.08em;">
    HEART <em style="color:var(--gold);font-style:normal;">&amp;</em> WINE
  </span>

</a>

<!-- HEADLINE -->

<h1 class="headline">
Something Great is Brewing
</h1>

<p class="text-sm opacity-80">
Our brewery website is getting a fresh pour.  
Stay tuned for craft beers, exclusive events, and the Heart & Wine experience.
</p>

<!-- COUNTDOWN -->

<div class="grid grid-cols-4 gap-4 mt-8">

<div class="countdown-box">
<span id="days">00</span>
<p>Days</p>
</div>

<div class="countdown-box">
<span id="hours">00</span>
<p>Hours</p>
</div>

<div class="countdown-box">
<span id="minutes">00</span>
<p>Minutes</p>
</div>

<div class="countdown-box">
<span id="seconds">00</span>
<p>Seconds</p>
</div>

</div>

<!-- EMAIL FORM -->

<form id="subscribeForm" class="mt-10 flex flex-col sm:flex-row gap-3 justify-center">

<input
type="email"
id="emailInput"
placeholder="Enter your email"
required
class="email-input"
/>

<button type="submit" class="subscribe-btn">
Notify Me
</button>

</form>

<p id="formMessage" class="text-sm mt-2 hidden"></p>

<!-- SOCIAL LINKS -->

<div class="flex justify-center gap-6 mt-8 text-xl">

<a href="#" class="social">🐦</a>
<a href="#" class="social">📸</a>
<a href="#" class="social">👍</a>

</div>

</div>

<script src="js/coming-soon.js"></script>
<script src="../global-js/main.js"></script>
<script src="../components/navbar.js"></script>
<script src="../components/footer.js"></script>
</body>

</html>
